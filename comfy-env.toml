# Conda packages (OpenGL stack for headless rendering)
[dependencies]
mesalib = "*"
libglu = "*"
libopengl = "*"
xorg-libxi = "*"
libxkbcommon = "*"

# Linux-specific packages (can't express in requirements.txt)
[target.linux-64.pypi-dependencies]
embreex = "*"

# Windows-specific packages
[target.win-64.pypi-dependencies]
msvc-runtime = "*"
embreex = "*"
