# ComfyUI-GeometryPack comfy-env configuration
# Uses comfy-env for isolated Python environment with bpy + cumesh

[geometrypack]
python = "3.11"           # Required by bpy
cuda_version = "auto"
pytorch_version = "auto"

    [geometrypack.cuda]
    cumesh = "0.0.1"

    [geometrypack.packages]
    requirements = [
        "bpy>=4.2,<4.3",
        "numpy<2",            # bpy requires numpy 1.x
        "trimesh>=4.0.0",
        "tqdm",               # Required by cumesh
        "cgal>=0.9.0",        # CGAL Python bindings for isotropic remeshing
    ]
