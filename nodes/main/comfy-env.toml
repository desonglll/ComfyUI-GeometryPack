[apt]
packages = ["libgl1-mesa-glx", "libgl1", "libopengl0", "libglu1-mesa"]

[dependencies]
cgal = "*"

[pypi-dependencies]
numpy = "*"
scipy = ">=1.7.0"
tqdm = ">=4.60.0"
requests = ">=2.25.0"
trimesh = { version = ">=4.0.0", extras = ["easy"] }
libigl = ">=2.6.1"
pymeshlab = ">=2025.7"
rtree = "*"
point-cloud-utils = ">=0.30.0"
mesh-to-sdf = ">=0.0.14"
fast-simplification = ">=0.1.5"
pymeshfix = ">=0.17.0"
xatlas = ">=0.0.11"
skeletor = ">=1.2.0"
pynanoinstantmeshes = "*"
pyquadriflow = "*"
matplotlib = ">=3.5.0"
pillow = ">=9.0.0"
pyvista = ">=0.43.0"

[target.win-64.pypi-dependencies]
embreex = "*"
msvc-runtime = "*"

[target.linux-64.pypi-dependencies]
embreex = "*"

[env_vars]
KMP_DUPLICATE_LIB_OK = "TRUE"
OMP_NUM_THREADS = 1
